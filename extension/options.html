<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ego Chrome Bridge</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main>
    <h1>Ego Chrome Bridge</h1>
    <p>Run <code>ego-chrome init</code>, then paste the local bridge token below.</p>

    <form id="settings-form">
      <label>
        Bridge token
        <input id="token" name="token" type="password" autocomplete="off" spellcheck="false" required pattern="[a-fA-F0-9]{64}">
      </label>
      <label>
        Port
        <input id="port" name="port" type="number" min="1024" max="65535" required value="32145">
      </label>
      <button type="submit">Save</button>
    </form>

    <p id="status" role="status" aria-live="polite"></p>
    <section>
      <h2>Privacy</h2>
      <p>The extension connects only to <code>127.0.0.1</code>. It can read and control tabs that Codex explicitly uses because the Chrome debugger permission is powerful. Review the source and keep the token private.</p>
    </section>
  </main>
  <script type="module" src="options.js"></script>
</body>
</html>
